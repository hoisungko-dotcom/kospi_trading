name: Windows EXE 빌드

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller
          python -c "import pandas; print('pandas OK:', pandas.__version__)"
          python -c "import numpy; print('numpy OK:', numpy.__version__)"

      - name: EXE 빌드
        run: python -m PyInstaller --onefile --console --name "KOSPI_자동매매" --collect-all pandas --collect-all numpy --collect-all pykrx --collect-all yfinance --collect-all pytz --collect-all python_dateutil --collect-all schedule --collect-all rich --collect-all anthropic --collect-all FinanceDataReader main.py

      - name: EXE 파일 확인
        run: |
          $exePath = Get-ChildItem -Path "dist" -Filter "*.exe" | Select-Object -First 1
          if ($exePath) {
            $sizeMB = [math]::Round($exePath.Length / 1MB, 1)
            Write-Host "BUILD OK: $($exePath.Name) ($sizeMB MB)"
          } else {
            Write-Host "BUILD FAILED: EXE not found"
            exit 1
          }
        shell: powershell

      - name: EXE 실행 테스트
        run: |
          $env:MOCK_TRADING = "true"
          $env:KIS_APPKEY = "test"
          $env:KIS_APPSECRET = "test"
          $env:KIS_ACCOUNT = "00000000-01"
          $exePath = (Get-ChildItem -Path "dist" -Filter "*.exe" | Select-Object -First 1).FullName
          Write-Host "Running: $exePath"
          Start-Process -FilePath $exePath -RedirectStandardOutput "out.txt" -RedirectStandardError "err.txt" -NoNewWindow -Wait -PassThru
          Write-Host "--- stdout ---"
          if (Test-Path "out.txt") { Get-Content "out.txt" | Select-Object -First 20 }
          Write-Host "--- stderr ---"
          if (Test-Path "err.txt") { Get-Content "err.txt" | Select-Object -First 30 }
        shell: powershell
        continue-on-error: true

      - name: GitHub Releases 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "KOSPI 자동매매 최신버전"
          body: |
            ## 설치 방법
            1. `KOSPI_자동매매.exe` 다운로드
            2. `.env.example` 파일을 `.env` 로 복사 후 KIS API 키 입력
            3. `KOSPI_자동매매.exe` 실행
          files: dist/KOSPI_자동매매.exe
          make_latest: true
